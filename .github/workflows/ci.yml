name: CI

# Checks en cada PR a main (no despliega nada): valida analyze, tests y build.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Solo falla ante errores; los warnings/infos preexistentes no bloquean.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build web (verificación)
        run: flutter build web --release
