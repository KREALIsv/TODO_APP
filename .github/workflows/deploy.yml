name: Deploy Wodo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-wodo-production
  cancel-in-progress: true

jobs:
  # Detecta qué cambió para desplegar solo lo necesario.
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      landing: ${{ steps.filter.outputs.landing }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'lib/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'web/**'
              - 'assets/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            landing:
              - 'landing/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            api:
              - 'backend/**'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'

  deploy:
    needs: changes
    # Corre si cambió algo relevante, o si es disparo manual.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || needs.changes.outputs.app == 'true'
          || needs.changes.outputs.landing == 'true'
          || needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    # GHCR exige owner en minúsculas; GITHUB_TOKEN necesita packages:write para push.
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_APP: ${{ needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch' }}
      DEPLOY_LANDING: ${{ needs.changes.outputs.landing == 'true' || github.event_name == 'workflow_dispatch' }}
      DEPLOY_API: ${{ needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: env.DEPLOY_API == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.DEPLOY_API == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Owner del repo puede tener mayúsculas (KREALIsv); GHCR solo acepta minúsculas.
      - name: Build and push API image
        if: env.DEPLOY_API == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/krealisv/wodo-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          # printf '%s\n' garantiza un salto de línea final (OpenSSH lo exige).
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Validación temprana con mensaje claro si el secret está malformado.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_PRIVATE_KEY no es una llave válida. Re-pega el contenido COMPLETO de la llave privada (líneas -----BEGIN----- y -----END----- incluidas) con salto de línea final. En Mac usa: cat ~/wodo-deploy-key | pbcopy"
            exit 1
          fi
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || 22 }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      # Infra ligera (compose + nginx + scripts): barato, se sincroniza siempre.
      - name: Sync deploy stack (compose + nginx + scripts)
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=yes" \
            deploy/docker-compose.yml deploy/nginx-spa.conf \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=yes" \
            deploy/scripts/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/scripts/"

      # --- App (Flutter web): solo si cambió lib/pubspec/web/assets/deploy ---
      - name: Setup Flutter
        if: env.DEPLOY_APP == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter web
        if: env.DEPLOY_APP == 'true'
        run: |
          flutter pub get
          # pwa-strategy=none: do not register Flutter's deprecated service
          # worker (uninstall stub + client.navigate can white-screen Safari).
          flutter build web --release --pwa-strategy=none \
            --dart-define=WODO_API_URL=https://api.wodo.app/api/v1

      - name: Sync web app
        if: env.DEPLOY_APP == 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=yes" \
            build/web/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/sites/web/"

      # --- Landing: solo si cambió landing/ (o deploy/) ---
      - name: Sync landing site
        if: env.DEPLOY_LANDING == 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=yes" \
            landing/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/sites/landing/"

      - name: Pull and bring up containers
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE="cd '${{ secrets.DEPLOY_PATH }}'"
          SSH=(ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || 22 }}" -o StrictHostKeyChecking=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}")
          if [ "${{ env.DEPLOY_API }}" = "true" ]; then
            # GHCR package is private by default; VPS must auth before pull.
            printf '%s' "$GHCR_TOKEN" | "${SSH[@]}" 'docker login ghcr.io -u krealisv --password-stdin'
            "${SSH[@]}" "${REMOTE} && docker compose pull api"
          fi
          "${SSH[@]}" "${REMOTE} && docker compose up -d"

      # NOTA: el registro en el edge compartido (scripts/setup-wodo-https.sh) es
      # de una sola vez y ya está aplicado; requiere privilegios para escribir el
      # Caddyfile compartido, por eso NO se corre en cada deploy. nginx sirve el
      # contenido nuevo directo desde el volumen.
