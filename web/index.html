<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WODO — captura notas y tareas al instante.">
  <meta name="theme-color" content="#F2327D">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WODO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WODO</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f7f2f4;
      color: #1b1215;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    #wodo-boot {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    #wodo-boot .brand {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #F2327D;
    }
    #wodo-boot .msg {
      font-size: 0.95rem;
      opacity: 0.72;
      max-width: 18rem;
      line-height: 1.4;
    }
    #wodo-boot .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(242, 50, 125, 0.22);
      border-top-color: #F2327D;
      border-radius: 50%;
      animation: wodo-spin 0.8s linear infinite;
    }
    #wodo-boot.error .spinner { display: none; }
    #wodo-boot.error .brand { color: #9b1c4a; }
    @keyframes wodo-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="wodo-boot" role="status" aria-live="polite">
    <div class="brand">WODO</div>
    <div class="spinner" aria-hidden="true"></div>
    <div class="msg" id="wodo-boot-msg">Cargando…</div>
  </div>
  <script>
    // Clear stale Flutter service workers / Cache Storage left by older
    // deploys before loading the app. Must finish before bootstrap runs.
    (async function () {
      var boot = document.getElementById('wodo-boot');
      var msg = document.getElementById('wodo-boot-msg');
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (reg) { return reg.unregister(); }));
        }
        if (window.caches && caches.keys) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function (key) { return caches.delete(key); }));
        }
      } catch (e) {
        console.warn('WODO boot cache cleanup skipped:', e);
      }

      window.addEventListener('flutter-first-frame', function () {
        var el = document.getElementById('wodo-boot');
        if (el) el.remove();
      });

      window.setTimeout(function () {
        if (!document.getElementById('wodo-boot')) return;
        if (document.querySelector('flutter-view')) return;
        if (boot) boot.classList.add('error');
        if (msg) {
          msg.textContent =
            'No se pudo cargar la app. Cierra la pestaña, borra los datos de app.wodo.app en Safari y vuelve a abrir.';
        }
      }, 45000);

      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      script.onerror = function () {
        if (boot) boot.classList.add('error');
        if (msg) {
          msg.textContent =
            'No se pudo descargar WODO. Revisa la conexión e inténtalo de nuevo.';
        }
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
