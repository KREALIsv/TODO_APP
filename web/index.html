<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="WODO — captura notas y tareas al instante.">
  <meta name="theme-color" content="#F2327D">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WODO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WODO</title>
  <link rel="manifest" href="manifest.json">

  <!-- Warm critical boot assets while the splash is visible. -->
  <link rel="preload" href="icons/Icon-192.png" as="image" type="image/png">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand-pink: #f2327d;
      --neutral-00: #f4f6f8;
      --neutral-60: #636c76;
      --black: #1f2328;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--neutral-00);
      color: var(--black);
      font-family: "Sora", ui-sans-serif, system-ui, sans-serif;
    }
    #wodo-boot {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 70% 45% at 50% 0%, rgba(242, 50, 125, 0.1), transparent 55%),
        radial-gradient(ellipse 45% 35% at 90% 85%, rgba(45, 164, 78, 0.1), transparent 50%),
        radial-gradient(ellipse 40% 30% at 10% 70%, rgba(175, 245, 180, 0.35), transparent 45%),
        var(--neutral-00);
    }
    #wodo-boot .boot-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(31, 35, 40, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 35, 40, 0.04) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, black 15%, transparent 75%);
      opacity: 0.7;
    }
    #wodo-boot .boot-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
      animation: wodo-rise 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    #wodo-boot .boot-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #wodo-boot .logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      box-shadow: 0 12px 28px rgba(242, 50, 125, 0.22);
      animation: wodo-float 4.5s ease-in-out infinite;
    }
    #wodo-boot .wordmark {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.24em;
      color: var(--neutral-60);
    }
    #wodo-boot .boot-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #wodo-boot .dots {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 10px;
    }
    #wodo-boot .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-pink);
      animation: wodo-dot 1.2s ease-in-out infinite;
    }
    #wodo-boot .dots span:nth-child(2) { animation-delay: 0.15s; }
    #wodo-boot .dots span:nth-child(3) { animation-delay: 0.3s; }
    #wodo-boot .msg {
      margin: 0;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--neutral-60);
      max-width: 18rem;
      line-height: 1.45;
    }
    #wodo-boot.error .dots { display: none; }
    #wodo-boot.error .msg {
      font-weight: 500;
      color: var(--black);
      max-width: 20rem;
    }
    @keyframes wodo-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes wodo-dot {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.45; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes wodo-rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="wodo-boot" role="status" aria-live="polite">
    <div class="boot-grid" aria-hidden="true"></div>
    <div class="boot-content">
      <div class="boot-brand">
        <img class="logo" src="icons/Icon-192.png" width="88" height="88" alt="WODO">
        <span class="wordmark">WODO</span>
      </div>
      <div class="boot-status">
        <div class="dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <p class="msg" id="wodo-boot-msg">Cargando…</p>
      </div>
    </div>
  </div>
  <script>
    // Called from Dart once Hive boxes are open and the home screen can paint.
    window.wodoRemoveBoot = function () {
      var el = document.getElementById('wodo-boot');
      if (el) el.remove();
    };

    (async function () {
      var boot = document.getElementById('wodo-boot');
      var msg = document.getElementById('wodo-boot-msg');
      var BOOT_CLEAN_KEY = 'wodo-boot-clean-v2';

      // One-time migration for users stuck on the old Flutter service worker.
      // Repeat visits skip this entirely so cold starts stay fast.
      if (localStorage.getItem(BOOT_CLEAN_KEY) !== '1') {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (reg) { return reg.unregister(); }));
          }
          if (window.caches && caches.keys) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function (key) { return caches.delete(key); }));
          }
          localStorage.setItem(BOOT_CLEAN_KEY, '1');
        } catch (e) {
          console.warn('WODO boot cache cleanup skipped:', e);
        }
      }

      window.setTimeout(function () {
        if (!document.getElementById('wodo-boot')) return;
        if (document.querySelector('flutter-view')) return;
        if (boot) boot.classList.add('error');
        if (msg) {
          msg.textContent =
            'No se pudo cargar la app. Cierra la pestaña, borra los datos de app.wodo.app en Safari y vuelve a abrir.';
        }
      }, 45000);

      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      script.onerror = function () {
        if (boot) boot.classList.add('error');
        if (msg) {
          msg.textContent =
            'No se pudo descargar WODO. Revisa la conexión e inténtalo de nuevo.';
        }
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
