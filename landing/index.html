<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Captura notas y tareas al instante. Tu inbox personal para ideas, recordatorios y acciones — en Android, iOS y web."
    />
    <title>Wodo</title>
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wodo.app/" />
    <meta property="og:site_name" content="Wodo" />
    <meta property="og:title" content="Wodo" />
    <meta
      property="og:description"
      content="Captura notas y tareas al instante. Tu inbox personal para ideas, recordatorios y acciones — en Android, iOS y web."
    />
    <meta property="og:image" content="https://wodo.app/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Wodo — captura notas y tareas al instante" />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wodo" />
    <meta
      name="twitter:description"
      content="Captura notas y tareas al instante. Tu inbox personal para ideas, recordatorios y acciones — en Android, iOS y web."
    />
    <meta name="twitter:image" content="https://wodo.app/assets/og-image.png" />
    <meta name="theme-color" content="#F2327D" />
    <meta name="application-name" content="Wodo" />
    <meta name="apple-mobile-web-app-title" content="Wodo" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>

    <main class="hero">
      <img
        class="mascot"
        src="assets/mascot.png"
        alt="Mascota de Wodo"
        width="320"
        height="320"
      />

      <h1 class="title">
        Captura
        <span class="mark">
          notas y tareas
          <svg
            class="scribble"
            viewBox="0 0 340 18"
            preserveAspectRatio="none"
            aria-hidden="true"
          >
            <path
              d="M4 11c42-6 88-8 132-7 48 1 96 5 148 2 18-1 36-3 52-2"
              fill="none"
              stroke="currentColor"
              stroke-width="5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M8 14c46-3 94-5 140-4 44 1 90 3 138 1 16-1 30-2 46-1"
              fill="none"
              stroke="currentColor"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.55"
            />
          </svg>
        </span>
        al instante
      </h1>

      <p class="subtitle">
        Tu inbox personal para ideas, recordatorios y acciones. Simple, rápido y
        listo en cualquier dispositivo.
      </p>

      <div class="cta" role="group" aria-label="Descargar o abrir Wodo">
        <a
          class="btn btn-glass btn-android"
          href="#android"
          data-store="android"
          aria-label="Descargar en Google Play"
        >
          <img
            class="btn-logo"
            src="assets/google-play.svg"
            alt=""
            width="28"
            height="31"
          />
        </a>

        <a
          class="btn btn-glass btn-apple"
          href="#ios"
          data-store="ios"
          aria-label="Descargar en App Store"
        >
          <img
            class="btn-logo"
            src="assets/apple.svg"
            alt=""
            width="24"
            height="29"
          />
        </a>

        <a
          class="btn btn-web"
          href="https://app.wodo.app"
          data-store="web"
          aria-label="Abrir web app en app.wodo.app"
        >
          <img
            class="btn-logo-app"
            src="assets/app_icon.png"
            alt=""
            width="72"
            height="72"
          />
        </a>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
