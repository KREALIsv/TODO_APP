<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Todos — captura notas y tareas al instante. Disponible en Android, iOS y web."
    />
    <title>Todos</title>
    <meta name="theme-color" content="#F2327D" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>

    <main class="hero">
      <img
        class="brand-icon"
        src="assets/app_icon.png"
        alt="Todos"
        width="160"
        height="160"
      />

      <h1 class="title">
        Captura
        <span class="mark">
          notas y tareas
          <svg
            class="scribble"
            viewBox="0 0 340 18"
            preserveAspectRatio="none"
            aria-hidden="true"
          >
            <path
              d="M4 11c42-6 88-8 132-7 48 1 96 5 148 2 18-1 36-3 52-2"
              fill="none"
              stroke="currentColor"
              stroke-width="5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M8 14c46-3 94-5 140-4 44 1 90 3 138 1 16-1 30-2 46-1"
              fill="none"
              stroke="currentColor"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.55"
            />
          </svg>
        </span>
        al instante
      </h1>

      <p class="subtitle">
        Tu inbox personal para ideas, recordatorios y acciones. Simple, rápido y
        listo en cualquier dispositivo.
      </p>

      <div class="cta">
        <a
          class="btn btn-android"
          href="#android"
          data-store="android"
          aria-label="Descargar en Google Play"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17.6 9.48 5.85 2.76A1.75 1.75 0 0 0 3.25 4.3v15.4a1.75 1.75 0 0 0 2.6 1.54l11.75-6.72a1.75 1.75 0 0 0 0-3.04ZM14.1 12 5.5 16.93V7.07L14.1 12Zm3.55.97 1.78 1.02a.75.75 0 0 1 0 1.3l-1.78 1.02L15.1 14.5l2.55-1.53Zm0-1.94L15.1 9.5l2.55-1.53 1.78 1.02a.75.75 0 0 1 0 1.3l-1.78 1.02Z"
            />
          </svg>
          Android
        </a>

        <a
          class="btn btn-apple"
          href="#ios"
          data-store="ios"
          aria-label="Descargar en App Store"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M16.37 12.64c-.03-2.2 1.8-3.26 1.88-3.31-1.03-1.5-2.62-1.71-3.18-1.73-1.35-.14-2.64.8-3.32.8-.69 0-1.74-.78-2.87-.76-1.48.02-2.84.86-3.6 2.18-1.54 2.67-.39 6.62 1.1 8.79.73 1.06 1.6 2.25 2.74 2.21 1.1-.05 1.52-.71 2.85-.71 1.32 0 1.71.71 2.87.69 1.19-.02 1.94-1.08 2.66-2.15.84-1.22 1.18-2.4 1.2-2.46-.03-.01-2.3-.88-2.33-3.55ZM14.7 5.9c.6-.73 1-1.74.89-2.75-.86.03-1.9.57-2.52 1.3-.55.64-1.04 1.67-.91 2.65.96.07 1.94-.49 2.54-1.2Z"
            />
          </svg>
          Apple
        </a>

        <a
          class="btn btn-web"
          href="#web"
          data-store="web"
          aria-label="Abrir web app"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2Zm7.9 9h-3.17a15.4 15.4 0 0 0-1.3-5.02A8.03 8.03 0 0 1 19.9 11ZM12 4c.9 0 2.3 1.7 3.05 5H8.95C9.7 5.7 11.1 4 12 4ZM4.1 13h3.17c.2 1.8.66 3.5 1.3 5.02A8.03 8.03 0 0 1 4.1 13Zm3.17-2H4.1a8.03 8.03 0 0 1 4.47-5.02A15.4 15.4 0 0 0 7.27 11ZM12 20c-.9 0-2.3-1.7-3.05-5h6.1C14.3 18.3 12.9 20 12 20Zm1.43-7H10.57a13.6 13.6 0 0 1-1.2-5h5.26a13.6 13.6 0 0 1-1.2 5Zm.2 2a13.6 13.6 0 0 1-1.63 4.02A13.6 13.6 0 0 1 10.37 15h3.26Zm3.16 3.02c.64-1.52 1.1-3.22 1.3-5.02h3.17a8.03 8.03 0 0 1-4.47 5.02Z"
            />
          </svg>
          Web
        </a>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
