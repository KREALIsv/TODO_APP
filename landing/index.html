<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Todos — captura notas y tareas al instante. Disponible en Android, iOS y web."
    />
    <title>Todos</title>
    <meta name="theme-color" content="#F2327D" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>

    <main class="hero">
      <img
        class="brand-icon"
        src="assets/app_icon.png"
        alt="Todos"
        width="160"
        height="160"
      />

      <h1 class="title">
        Captura
        <span class="mark">
          notas y tareas
          <svg
            class="scribble"
            viewBox="0 0 340 18"
            preserveAspectRatio="none"
            aria-hidden="true"
          >
            <path
              d="M4 11c42-6 88-8 132-7 48 1 96 5 148 2 18-1 36-3 52-2"
              fill="none"
              stroke="currentColor"
              stroke-width="5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M8 14c46-3 94-5 140-4 44 1 90 3 138 1 16-1 30-2 46-1"
              fill="none"
              stroke="currentColor"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.55"
            />
          </svg>
        </span>
        al instante
      </h1>

      <p class="subtitle">
        Tu inbox personal para ideas, recordatorios y acciones. Simple, rápido y
        listo en cualquier dispositivo.
      </p>

      <div class="cta" role="group" aria-label="Descargar o abrir Todos">
        <a
          class="btn btn-glass btn-android"
          href="#android"
          data-store="android"
          aria-label="Descargar en Google Play"
        >
          <svg class="btn-logo" viewBox="0 0 512 512" aria-hidden="true">
            <path
              fill="#EA4335"
              d="M47.1 0C34 0 24 10 24 23.1v465.8C24 502 34 512 47.1 512c4.9 0 9.6-1.6 13.6-4.5l277.1-166.1L47.1 0z"
            />
            <path
              fill="#FBBC04"
              d="M47.1 0l230.2 234.3L47.1 512c-13.1 0-23.1-10-23.1-23.1V23.1C24 10 34 0 47.1 0z"
            />
            <path
              fill="#34A853"
              d="M47.1 0l230.2 234.3 230.2-68.8c13.4-4 23.1-16.4 23.1-30.3s-9.7-26.3-23.1-30.3L47.1 0z"
            />
            <path
              fill="#4285F4"
              d="M325.3 234.3L104.6 13l280.8 161.6-60.1 59.7z"
            />
          </svg>
        </a>

        <a
          class="btn btn-glass btn-apple"
          href="#ios"
          data-store="ios"
          aria-label="Descargar en App Store"
        >
          <svg class="btn-logo" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M16.37 12.64c-.03-2.2 1.8-3.26 1.88-3.31-1.03-1.5-2.62-1.71-3.18-1.73-1.35-.14-2.64.8-3.32.8-.69 0-1.74-.78-2.87-.76-1.48.02-2.84.86-3.6 2.18-1.54 2.67-.39 6.62 1.1 8.79.73 1.06 1.6 2.25 2.74 2.21 1.1-.05 1.52-.71 2.85-.71 1.32 0 1.71.71 2.87.69 1.19-.02 1.94-1.08 2.66-2.15.84-1.22 1.18-2.4 1.2-2.46-.03-.01-2.3-.88-2.33-3.55ZM14.7 5.9c.6-.73 1-1.74.89-2.75-.86.03-1.9.57-2.52 1.3-.55.64-1.04 1.67-.91 2.65.96.07 1.94-.49 2.54-1.2Z"
            />
          </svg>
        </a>

        <a
          class="btn btn-web"
          href="https://app.wodo.como"
          data-store="web"
          aria-label="Abrir web app en app.wodo.como"
        >
          <img
            class="btn-logo-app"
            src="assets/app_icon.png"
            alt=""
            width="72"
            height="72"
          />
        </a>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
