# Wodo — landing (wodo.app) + web app (app.wodo.app) + api (api.wodo.app)
#
# Este stack NO publica 80/443 del host: en este VPS esos puertos los tiene
# el Caddy compartido (syvar-uat-caddy). Los contenedores se conectan a la red
# externa del Caddy (syvar_default) y se exponen vía reverse_proxy con el
# script deploy/scripts/setup-wodo-https.sh.
services:
  landing:
    image: nginx:1.27-alpine
    container_name: wodo-landing
    restart: unless-stopped
    volumes:
      - ./sites/landing:/usr/share/nginx/html:ro
    networks:
      - edge

  web:
    image: nginx:1.27-alpine
    container_name: wodo-web
    restart: unless-stopped
    volumes:
      - ./sites/web:/usr/share/nginx/html:ro
      - ./nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge

  api:
    image: ghcr.io/krealisv/wodo-api:latest
    container_name: wodo-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://api.wodo.app}
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.wodo.app,https://wodo.app}
      DATABASE_URL: ${DATABASE_URL}
      SECRET_AUTH_TOKEN_KEY: ${SECRET_AUTH_TOKEN_KEY}
      ACCESS_TOKEN_EXPIRATION: ${ACCESS_TOKEN_EXPIRATION:-15m}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION:-7d}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      REVENUECAT_WEBHOOK_AUTHORIZATION: ${REVENUECAT_WEBHOOK_AUTHORIZATION}
      REVENUECAT_WEBHOOK_SIGNING_SECRET: ${REVENUECAT_WEBHOOK_SIGNING_SECRET}
    networks:
      - edge
    healthcheck:
      test: ['CMD', 'node', '-e', 'require("http").get("http://127.0.0.1:3000/api/health")']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  # Red del Caddy compartido. Sobrescribible con EDGE_NETWORK en .env.
  edge:
    external: true
    name: ${EDGE_NETWORK:-syvar_default}
