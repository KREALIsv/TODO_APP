services:
  caddy:
    image: caddy:2-alpine
    container_name: dowo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      LANDING_DOMAIN: ${LANDING_DOMAIN:-dowo.com}
      APP_DOMAIN: ${APP_DOMAIN:-app.dowo.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites/landing:/srv/landing:ro
      - ./sites/web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
