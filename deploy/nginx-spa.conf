server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web es una SPA: rutas desconocidas caen a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash; el index nunca se cachea.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
