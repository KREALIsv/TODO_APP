services:
  db:
    image: postgres:16-alpine
    container_name: wodo-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wodo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wodo_password}
      POSTGRES_DB: ${POSTGRES_DB:-wodo}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - wodo-db-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wodo-dev

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: wodo-api-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_PUBLIC_URL: http://localhost:3000
      API_PREFIX: /api
      DATABASE_URL: postgresql://${POSTGRES_USER:-wodo_user}:${POSTGRES_PASSWORD:-wodo_password}@db:5432/${POSTGRES_DB:-wodo}
      SECRET_AUTH_TOKEN_KEY: ${SECRET_AUTH_TOKEN_KEY:-dev-secret-must-be-at-least-32-chars-long}
      ACCESS_TOKEN_EXPIRATION: 15m
      REFRESH_TOKEN_EXPIRATION: 7d
      CORS_ALLOWED_ORIGINS: http://localhost:8080
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 1000
      WODO_APP_URL: http://localhost:8080
      MAIL_MAX_PER_USER_FLOW: 2
      MAIL_FLOW_WINDOW_HOURS: 24
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/prisma/migrations:/app/prisma/migrations:ro
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"
    networks:
      - wodo-dev

volumes:
  wodo-db-dev-data:

networks:
  wodo-dev:
    driver: bridge
